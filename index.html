<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculateur de blocs DMV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Style glass inspiré iPhone */
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #e0e0e0, #ffffff);
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 30px 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #1a1a1a;
    }

    .form-label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #ff0000;
      font-size: 16px;
    }

    .form-control {
      background-color: rgba(255,255,255,0.6);
      border: 1px solid #ff0000;
      color: #1a1a1a;
      font-size: 18px;
      border-radius: 12px;
      padding: 12px;
    }

    .form-control::placeholder {
      color: #555;
    }

    .form-control:focus {
      outline: none;
      border-color: #cc0000;
      box-shadow: 0 0 10px rgba(255,0,0,0.4);
      background-color: rgba(255,255,255,0.8);
    }

    .btn-custom {
      width: 100%;
      background-color: #ff0000;
      color: #fff;
      border: none;
      font-weight: bold;
      font-size: 20px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(255,0,0,0.5);
      backdrop-filter: blur(5px);
    }

    .btn-custom:active {
      transform: scale(0.98);
    }

    .result-box {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,0,0,0.4);
      text-align: center;
      font-size: 20px;
      color: #1a1a1a;
      backdrop-filter: blur(10px);
    }

    .big {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #ff0000;
    }

    .good { color: #00b050; font-weight: bold; }
    .bad { color: #ff0000; font-weight: bold; }
  </style>
</head>

<body>
<div class="container">
  <div class="card">
    <h3 class="text-center mb-4" style="color:#ff0000;">⚙️ Calculateur de blocs DMV</h3>

    <div class="mb-3">
      <label for="blocks" class="form-label">Nombre de blocs (1 file)</label>
      <input id="blocks" type="number" class="form-control" placeholder="Ex: 3">
    </div>

    <div class="mb-3">
      <label for="blocksTwoFiles" class="form-label">Blocs en 2 file (facultatif)</label>
      <input id="blocksTwoFiles" type="number" class="form-control" placeholder="Ex: 9">
    </div>

    <div class="mb-3">
      <label for="cadence" class="form-label">Cadence actuelle (sec / bloc)</label>
      <input id="cadence" type="number" class="form-control" placeholder="Ex: 93">
    </div>

    <button class="btn btn-custom mt-3" onclick="calculer()">CALCULER</button>

    <div id="resultat" class="result-box"></div>
  </div>
</div>

<script>
function formatTemps(seconds) {
  let h = Math.floor(seconds / 3600);
  let m = Math.floor((seconds % 3600) / 60);
  let s = Math.floor(seconds % 60);
  return (h > 0 ? h + "h " : "") + (m > 0 ? m + "min " : "") + s + "s";
}

function getFinPoste(now) {
  let h = now.getHours();
  let fin = new Date(now);
  if (h >= 5 && h < 13) fin.setHours(13, 0, 0);
  else if (h >= 13 && h < 21) fin.setHours(21, 0, 0);
  else if (h >= 21) { fin.setDate(fin.getDate()+1); fin.setHours(5,0,0); }
  else fin.setHours(5,0,0);
  return fin;
}

function calculer() {
  let blocks = Number(document.getElementById("blocks").value) || 0;
  let blocksTwo = Number(document.getElementById("blocksTwoFiles").value);
  if (isNaN(blocksTwo)) blocksTwo = 0;
  let cadence = Number(document.getElementById("cadence").value);
  if (!cadence) return;

  let pas = blocks;
  if (blocksTwo > 0) {
    let extraSingle = blocksTwo % 2;
    let doublePas = Math.floor(blocksTwo / 2);
    pas += extraSingle + doublePas;
  }

  let totalSeconds = pas * cadence;

  let now = new Date();
  let fin = new Date(now.getTime() + totalSeconds * 1000);
  let finPoste = getFinPoste(now);
  let objectif = new Date(finPoste.getTime() - 10*60*1000);

  let restant = (objectif - now)/1000;
  let cadenceCible = restant > 0 ? restant / pas : 0;

  let isSlow = cadence > cadenceCible;

  document.getElementById("resultat").innerHTML = `
    <div class="big">${formatTemps(totalSeconds)}</div>
    <div>Fin actuelle : <span style='color:#ff0000'>${fin.toLocaleTimeString()}</span></div>
    <div style="margin-top:10px; font-size:18px;">
      Cadence souhaitée pour finir 10 min avant la fin du poste :
      <span style='color:#ff0000'>${cadenceCible.toFixed(2)} sec/bloc</span>
    </div>
    <div class="mt-2 ${isSlow?'bad':'good'}">
      ${isSlow ? 'À l’heure ? 🚫 Non — cadence trop lente' : 'À l’heure 👍 cadence correcte'}
    </div>
  `;
}
</script>

</body>
</html>
